<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DyLeks - Bat Theme Prototype</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="background-container">
        <!-- Floating particles / stars -->
        <div class="star"></div>
        <div class="star"></div>
        <div class="star"></div>
    </div>

    <!-- HOME PAGE -->
    <main id="home-page" class="page active">
        <header class="hero-section">
            <div class="mascot-container">
                <!-- Premium Bat Mascot SVG -->
                <svg class="bat-mascot" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
                    <defs>
                        <linearGradient id="batGrad" x1="0%" y1="0%" x2="100%" y2="100%">
                            <stop offset="0%" stop-color="#00F0FF" />
                            <stop offset="100%" stop-color="#623CEA" />
                        </linearGradient>
                        <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
                            <feGaussianBlur stdDeviation="5" result="blur" />
                            <feComposite in="SourceGraphic" in2="blur" operator="over" />
                        </filter>
                    </defs>
                    <!-- Bat Wings -->
                    <path class="wing left-wing" d="M100 80 Q 50 20 10 50 Q 30 80 15 110 Q 50 100 70 140 Q 80 110 100 110 Z" fill="url(#batGrad)" />
                    <path class="wing right-wing" d="M100 80 Q 150 20 190 50 Q 170 80 185 110 Q 150 100 130 140 Q 120 110 100 110 Z" fill="url(#batGrad)" />
                    <!-- Bat Body -->
                    <circle cx="100" cy="95" r="25" fill="#1A1B41" stroke="url(#batGrad)" stroke-width="4" filter="url(#glow)"/>
                    <!-- Bat Ears -->
                    <polygon points="85,75 75,45 95,72" fill="#00F0FF" />
                    <polygon points="115,75 125,45 105,72" fill="#00F0FF" />
                    <!-- Bat Eyes (Cute but cool) -->
                    <ellipse cx="90" cy="95" rx="5" ry="8" fill="#00F0FF" />
                    <ellipse cx="110" cy="95" rx="5" ry="8" fill="#00F0FF" />
                    <!-- Eye shine -->
                    <circle cx="89" cy="92" r="2" fill="#FFF" />
                    <circle cx="109" cy="92" r="2" fill="#FFF" />
                </svg>
            </div>
            
            <h1 class="app-title">DyLeks <span class="highlight">Night</span></h1>
            <p class="app-subtitle">Membaca menjadi petualangan menembus malam.</p>
        </header>

        <section class="action-section">
            <button id="btn-start" class="btn-primary">
                <span class="btn-text">Mulai Petualangan</span>
                <svg class="icon-right" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <line x1="5" y1="12" x2="19" y2="12"></line>
                    <polyline points="12 5 19 12 12 19"></polyline>
                </svg>
            </button>
        </section>
    </main>

    <!-- SCREENING PAGE -->
    <main id="screening-page" class="page hidden">
        <nav class="top-nav">
            <button id="btn-back" class="btn-icon">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <line x1="19" y1="12" x2="5" y2="12"></line>
                    <polyline points="12 19 5 12 12 5"></polyline>
                </svg>
            </button>
            <h2>Misi Skrining</h2>
            <div class="nav-spacer"></div>
        </nav>

        <section class="glass-card main-task-card">
            <div class="task-icon">
                <!-- Book/Radar SVG -->
                <svg viewBox="0 0 24 24" fill="none" stroke="#00F0FF" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"></path>
                    <path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"></path>
                </svg>
            </div>
            <h3 class="task-title">Pindai Buku</h3>
            <p class="task-desc">Arahkan kamera ke tulisan yang ingin kamu baca.</p>
            
            <div class="camera-placeholder">
                <div class="scan-line"></div>
                <svg class="camera-icon" viewBox="0 0 24 24" fill="none" stroke="#623CEA" stroke-width="2">
                    <path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"></path>
                    <circle cx="12" cy="13" r="4"></circle>
                </svg>
            </div>

            <button class="btn-primary camera-btn">
                <svg class="icon-left" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="12" cy="12" r="10"></circle>
                    <circle cx="12" cy="12" r="3"></circle>
                </svg>
                Ambil Gambar
            </button>
        </section>
    </main>

    <script src="script.js"></script>
</body>
</html>
